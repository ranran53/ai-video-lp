<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="スマホだけでCodexをやさしく始めるための、絵本風スマホLPです。"
    />
    <title>スマホだけで、Codexをやさしく始める。</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="lp-phone" id="top" aria-label="Codexスマホ入門LP">
      <section class="lp-section hero" aria-label="スマホだけでCodexをやさしく始める">
        <div class="media-frame hero-frame">
          <img
            src="images/hero.png"
            alt="初心者向け。スマホだけでCodexをやさしく始める。はじめてでも大丈夫。作る・整える・届ける流れを、絵本みたいにやさしく案内します。"
            width="1122"
            height="1402"
          />
        </div>
        <a class="cta-button" href="https://note.com/" data-cta-link>Codex入門を見る</a>
      </section>

      <section class="lp-section feature" aria-label="Codexでできること">
        <div class="feature-grid">
          <img src="images/feature-smartphone.png" alt="スマホで完結。アプリのようにかんたん操作。" width="1254" height="1254" />
          <img src="images/feature-guide.png" alt="やさしくガイド。迷わず進めるようにしっかりサポート。" width="1254" height="1254" />
          <img src="images/feature-post.png" alt="投稿管理。記事やアイデアをすっきり整理。" width="1254" height="1254" />
          <img src="images/feature-lp.png" alt="LPづくり。デザインも文章もやさしくつくれる。" width="1254" height="1254" />
        </div>
      </section>

      <section class="lp-section worry" aria-label="Codexを始める前の悩み">
        <div class="media-frame wide-frame">
          <img src="images/worry-section.png" alt="こんな悩み、ありませんか？ 何から始めればいいかわからない、コードが難しそう、スマホだけでできるか不安。その気持ち、とってもわかります。" width="1448" height="1086" />
        </div>
      </section>

      <section class="lp-section detail" aria-label="Codexでできることの詳細">
        <div class="media-frame wide-frame">
          <img src="images/detail-features.png" alt="Codexでできること。LPの土台づくり、投稿管理の整理、note導線の設計、テンプレ化。" width="1448" height="1086" />
        </div>
      </section>

      <section class="lp-section steps" aria-label="Codexをやさしく始める4ステップ">
        <div class="media-frame steps-frame">
          <img src="images/steps.png" alt="やさしく始める4ステップ。まず知る、指示を出す、形にする、公開する。" width="1448" height="1086" />
        </div>
      </section>

      <section class="lp-section final" aria-label="Codex入門への最後の案内">
        <div class="media-frame final-frame">
          <img src="images/final-cta.png" alt="絵本みたいに、やさしく始めるCodex。さあ、一緒にあなたの物語をカタチにしましょう。" width="1448" height="1086" />
        </div>
        <a class="cta-button cta-button-final" href="https://note.com/" data-cta-link>Codex入門を見る</a>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
